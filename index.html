<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像处理程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
                <span>图像处理</span>
            </div>
            <div class="toolbar-actions">
                <button id="uploadBtn" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传图片
                </button>
                <button id="downloadBtn" class="btn btn-secondary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载
                </button>
                <button id="resetBtn" class="btn btn-danger" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    重置
                </button>
            </div>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </header>

        <!-- 主工作区 -->
        <main class="workspace">
            <!-- 左侧控制面板 -->
            <aside class="sidebar">
                <!-- 基础调整 -->
                <div class="panel">
                    <h3 class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.8 17.8l-4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.07-4.93l-4.24 4.24M6.34 6.34l-4.24-4.24"/>
                        </svg>
                        基础调整
                    </h3>
                    <div class="control-group">
                        <label>亮度 <span id="brightnessValue">100%</span></label>
                        <input type="range" id="brightness" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>对比度 <span id="contrastValue">100%</span></label>
                        <input type="range" id="contrast" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>饱和度 <span id="saturationValue">100%</span></label>
                        <input type="range" id="saturation" min="0" max="200" value="100">
                    </div>
                    <div class="control-group">
                        <label>色相旋转 <span id="hueValue">0°</span></label>
                        <input type="range" id="hue" min="0" max="360" value="0">
                    </div>
                </div>

                <!-- 高级调整 -->
                <div class="panel">
                    <h3 class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9M12 4h9M3 12h18M3 20h6M3 4h6M3 12h6"/>
                        </svg>
                        高级调整
                    </h3>
                    <div class="control-group">
                        <label>模糊 <span id="blurValue">0px</span></label>
                        <input type="range" id="blur" min="0" max="20" value="0">
                    </div>
                    <div class="control-group">
                        <label>灰度 <span id="grayscaleValue">0%</span></label>
                        <input type="range" id="grayscale" min="0" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>深褐色 <span id="sepiaValue">0%</span></label>
                        <input type="range" id="sepia" min="0" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>反色 <span id="invertValue">0%</span></label>
                        <input type="range" id="invert" min="0" max="100" value="0">
                    </div>
                </div>

                <!-- 预设滤镜 -->
                <div class="panel">
                    <h3 class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        预设滤镜
                    </h3>
                    <div class="filter-grid">
                        <button class="filter-btn" data-filter="normal">原图</button>
                        <button class="filter-btn" data-filter="warm">暖色</button>
                        <button class="filter-btn" data-filter="cool">冷色</button>
                        <button class="filter-btn" data-filter="vintage">复古</button>
                        <button class="filter-btn" data-filter="bw">黑白</button>
                        <button class="filter-btn" data-filter="dramatic">戏剧</button>
                        <button class="filter-btn" data-filter="cyberpunk">赛博朋克</button>
                        <button class="filter-btn" data-filter="dream">梦幻</button>
                    </div>
                </div>

                <!-- 变换操作 -->
                <div class="panel">
                    <h3 class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3h18v18H3zM9 3v18M15 3v18M3 9h18M3 15h18"/>
                        </svg>
                        变换
                    </h3>
                    <div class="transform-buttons">
                        <button id="rotateLeft" class="btn btn-icon" title="向左旋转">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 14 4 9 9 4"/>
                                <path d="M4 9h10a4 4 0 0 1 4 4v4"/>
                            </svg>
                        </button>
                        <button id="rotateRight" class="btn btn-icon" title="向右旋转">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 14 20 9 15 4"/>
                                <path d="M20 9H10a4 4 0 0 0-4 4v4"/>
                            </svg>
                        </button>
                        <button id="flipH" class="btn btn-icon" title="水平翻转">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 20h9M12 4h9M3 12h18"/>
                            </svg>
                        </button>
                        <button id="flipV" class="btn btn-icon" title="垂直翻转">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 12h16M12 3v18"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- 特效 -->
                <div class="panel">
                    <h3 class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
                            <line x1="9.69" y1="8" x2="21.17" y2="8"/>
                            <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
                            <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
                            <line x1="14.31" y1="16" x2="2.83" y2="16"/>
                            <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
                        </svg>
                        特效
                    </h3>
                    <div class="effect-buttons">
                        <button id="sharpenBtn" class="btn btn-effect">锐化</button>
                        <button id="edgeBtn" class="btn btn-effect">边缘检测</button>
                        <button id="embossBtn" class="btn btn-effect">浮雕</button>
                        <button id="pixelateBtn" class="btn btn-effect">像素化</button>
                        <button id="noiseBtn" class="btn btn-effect">噪点</button>
                        <button id="vignetteBtn" class="btn btn-effect">暗角</button>
                    </div>
                </div>
            </aside>

            <!-- 画布区域 -->
            <div class="canvas-area">
                <div class="canvas-container" id="canvasContainer">
                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <p>点击或拖拽上传图片</p>
                        <span>支持 JPG、PNG、GIF、WebP 格式</span>
                    </div>
                    <canvas id="canvas" hidden></canvas>
                </div>
                <div class="canvas-info" id="canvasInfo" hidden>
                    <span id="imageSize"></span>
                    <span id="zoomLevel">100%</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading" hidden>
        <div class="spinner"></div>
        <span>处理中...</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
